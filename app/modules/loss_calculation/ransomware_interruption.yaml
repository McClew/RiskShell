title: "Ransomware Business Interruption Liability Model"
description: |
  Calculates the total financial loss incurred when core operations are locked down due to a destructive ransomware incident. It explicitly highlights how backup recovery validation speeds dictate real-world risk exposure.
methodology: |
  Total Revenue Loss = Daily Operational Revenue * (System Recovery Time Days + Forensic Window Days)
  Total Incident Cost = Total Revenue Loss + Incident Response Premium Fees + Extortion Demands
pros:
  - "Demonstrates perfectly why backup validation and business continuity tests matter far more than static security policies."
cons:
  - "Assumes daily business revenue loss is linear, which might not hold true for highly seasonal operational business profiles."
variables:
  - name: "DAILY_REVENUE"
    default: 15000.0
    required: true
    description: "The total daily gross revenue generated by the organisation's online/digital operational footprint."
    source: "Corporate financial balance sheets."
  - name: "SYSTEM_RECOVERY_DAYS"
    default: 5.5
    required: true
    description: "The time required to securely rebuild infrastructure from clean offline back-ups."
    source: "Disaster recovery exercise logs."
  - name: "FORENSIC_WINDOW_DAYS"
    default: 2.0
    required: true
    description: "The regulatory and technical investigation window required before systems are safely permitted to spin back online."
    source: "Legal team advisory counsel notes."
  - name: "FLAT_PREMIUM_FEES"
    default: 30000.0
    required: true
    description: "Emergency incident response outlays, out-of-hours technician overtime wages, and specialised hardware provisioning costs."
    source: "Historical vendor breach response quote baselines."
formula: "(DAILY_REVENUE * (SYSTEM_RECOVERY_DAYS + FORENSIC_WINDOW_DAYS)) + FLAT_PREMIUM_FEES"
output_title: "Total Expected Ransomware Business Interruption Financial Impact:"
output_prefix: "£"